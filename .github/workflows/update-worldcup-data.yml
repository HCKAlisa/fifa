name: Update World Cup Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: update-worldcup-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh football-data.org API files
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION || 'WC' }}
          FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON || '2026' }}
          SKIP_BEFORE_FIRST_MATCH: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          MATCH_UPDATE_OFFSET_HOURS: ${{ github.event_name == 'schedule' && '0,3' || '' }}
          MATCH_UPDATE_WINDOW_MINUTES: ${{ github.event_name == 'schedule' && '15' || '0' }}
        run: node scripts/update-football-data.js

      - name: Commit live API JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update World Cup live API data"
          file_pattern: data/live-*.json
